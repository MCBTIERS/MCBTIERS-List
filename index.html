<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCB Tiers</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; padding: 20px; }
        h1 { text-align: center; color: #ffffff; margin-bottom: 20px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 25px; overflow-x: auto; justify-content: center; flex-wrap: wrap; max-width: 800px; margin-left: auto; margin-right: auto; }
        .tab-btn { background: #161b22; border: 1px solid #30363d; color: white; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem; white-space: nowrap; }
        .tab-btn.active { background: #30363d; border-color: #4a5568; }
        .player-card { background: #161b22; border-radius: 12px; display: flex; align-items: center; padding: 15px; margin-bottom: 10px; border: 1px solid #30363d; width: 100%; max-width: 550px; margin-left: auto; margin-right: auto; }
        .rank-number { font-size: 1.5rem; font-weight: bold; color: #f59e0b; margin-right: 15px; width: 40px; text-align: center; }
        .avatar-skin { width: 50px; height: 50px; background: #21262d; border-radius: 8px; margin-right: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .avatar-skin img { width: 100%; height: 100%; object-fit: cover; }
        .info { flex-grow: 1; }
        .name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .name { font-size: 1.1rem; font-weight: bold; }
        .pts { font-size: 0.8rem; background: #0284c7; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<h1>MCB TIERS</h1>

<div class="tabs">
    <button class="tab-btn active" onclick="switchView('general')">🏆 General</button>
</div>

<div id="view-general">
    <!-- Puesto #1: TÚ -->
    <div class="player-card">
        <div class="rank-number">#1</div>
        <div class="avatar-skin"><img src="https://i.imgur.com/Q3rKrxl.jpeg" alt="KRONOS OG"></div>
        <div class="info">
            <div class="name-row">
                <div class="name">KRONOS OG1567</div>
                <div class="pts">106 Pts</div>
            </div>
        </div>
    </div>
    <!-- Puesto #2: Asasin -->
    <div class="player-card">
        <div class="rank-number">#2</div>
        <div class="avatar-skin"><img src="https://mc-heads.net/avatar/Asasin" alt="Asasin"></div>
        <div class="info">
            <div class="name-row">
                <div class="name">Asasin</div>
                <div class="pts">34 Pts</div>
            </div>
        </div>
    </div>
    <!-- Puesto #3: Ryou -->
    <div class="player-card">
        <div class="rank-number">#3</div>
        <div class="avatar-skin"><img src="https://mc-heads.net/avatar/Ryou" alt="Ryou"></div>
        <div class="info">
            <div class="name-row">
                <div class="name">Ryou</div>
                <div class="pts">14 Pts</div>
            </div>
        </div>
    </div>
    <!-- Puesto #4: Conter -->
    <div class="player-card">
        <div class="rank-number">#4</div>
        <div class="avatar-skin"><img src="https://mc-heads.net/avatar/Conter" alt="Conter"></div>
        <div class="info">
            <div class="name-row">
                <div class="name">Conter</div>
                <div class="pts">10 Pts</div>
            </div>
        </div>
    </div>
    <!-- Puesto #5: LastNight -->
    <div class="player-card">
        <div class="rank-number">#5</div>
        <div class="avatar-skin"><img src="https://mc-heads.net/avatar/LastNight" alt="LastNight"></div>
        <div class="info">
            <div class="name-row">
                <div class="name">LastNight</div>
                <div class="pts">10 Pts</div>
            </div>
        </div>
    </div>
</div>

<script>
    function switchView(target) {
        // Lógica de pestañas
    }
</script>

</body>
</html>
