<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCB Tiers</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            background-color: #f4f4f9; 
        }
        .mcb-tiers { 
            width: 100%; 
            border-collapse: collapse; 
            background-color: #fff; 
        }
        .mcb-tiers th, .mcb-tiers td { 
            padding: 12px; 
            border: 1px solid #ddd; 
            text-align: center; 
        }
        .mcb-tiers th { 
            background-color: #333; 
            color: white; 
        }
        .skin-img { 
            width: 50px; 
            height: 50px; 
            object-fit: cover;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <table class="mcb-tiers">
        <tr>
            <th>Jugador</th>
            <th>Skin</th>
            <th>Puntos</th>
        </tr>
        <tr>
            <td><strong>KRONOS OG</strong></td>
            <td><img src="https://i.imgur.com/15cJ2d2.jpg" class="skin-img" alt="KRONOS OG"></td>
            <td>12565</td>
        </tr>
        <tr>
            <td><strong>Last</strong></td>
            <td><img src="https://i.imgur.com/ebre-ZpuFgkz.jpg" class="skin-img" alt="Last"></td>
            <td>0</td>
        </tr>
    </table>

</body>
</html>
