<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCB Tiers - Clasificación</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; padding: 15px; }
        h1 { text-align: center; color: #ffffff; }
        .player-card { background: #161b22; border-radius: 12px; display: flex; align-items: center; padding: 15px; margin-bottom: 12px; border: 1px solid #30363d; }
        .rank-number { font-size: 1.8rem; font-weight: bold; color: #f59e0b; margin-right: 15px; width: 40px; text-align: center; }
        .avatar { width: 65px; height: 65px; background: #21262d; border-radius: 6px; margin-right: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .info { flex-grow: 1; }
        .name { font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; }
        .tiers-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .tier-item { display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .icon { font-size: 1.3rem; }
        .tag { font-size: 0.7rem; font-weight: bold; background: #30363d; padding: 2px 6px; border-radius: 4px; border: 1px solid #444; }
    </style>
</head>
<body>

<h1>MCB TIERS</h1>

<!-- KRONOS OG -->
<div class="player-card">
    <div class="rank-number">#1</div>
    <div class="avatar"><img src="kronos.jpg" alt="Skin"></div>
    <div class="info">
        <div class="name">KRONOS OG</div>
        <div class="tiers-row">
            <div class="tier-item"><span class="icon">⚔️</span><span class="tag">LT2</span></div>
            <div class="tier-item"><span class="icon">🍎</span><span class="tag">LT3</span></div>
            <div class="tier-item"><span class="icon">🔮</span><span class="tag">LT5</span></div>
            <div class="tier-item"><span class="icon">🔨</span><span class="tag">LT4</span></div>
        </div>
    </div>
</div>

<!-- Asasin -->
<div class="player-card">
    <div class="rank-number">#2</div>
    <div class="avatar">👤</div>
    <div class="info">
        <div class="name">Asasin</div>
        <div class="tiers-row">
            <div class="tier-item"><span class="icon">⚔️</span><span class="tag">LT3</span></div>
        </div>
    </div>
</div>

<!-- Ryou -->
<div class="player-card">
    <div class="rank-number">#3</div>
    <div class="avatar">👤</div>
    <div class="info">
        <div class="name">Ryou</div>
        <div class="tiers-row">
            <div class="tier-item"><span class="icon">⚔️</span><span class="tag">LT5</span></div>
        </div>
    </div>
</div>

<!-- Conter -->
<div class="player-card">
    <div class="rank-number">#4</div>
    <div class="avatar">👤</div>
    <div class="info">
        <div class="name">Conter</div>
        <div class="tiers-row">
            <div class="tier-item"><span class="icon">⚔️</span><span class="tag">LT4</span></div>
        </div>
    </div>
</div>

<!-- LastNight -->
<div class="player-card">
    <div class="rank-number">#5</div>
    <div class="avatar">👤</div>
    <div class="info">
        <div class="name">LastNight</div>
        <div class="tiers-row">
            <div class="tier-item"><span class="icon">⚔️</span><span class="tag">LT4</span></div>
        </div>
    </div>
</div>

</body>
                                       </html>
