<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; padding: 10px; }
        .player-card { background: #161b22; border-radius: 10px; display: flex; align-items: center; padding: 12px; border: 1px solid #30363d; }
        
        .rank-number { font-size: 1.6rem; font-weight: bold; color: #f59e0b; margin-right: 15px; }
        
        .avatar { width: 70px; height: 70px; background: #000; border-radius: 5px; margin-right: 15px; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .info { flex-grow: 1; }
        .name { font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; }
        
        .tiers-row { display: flex; gap: 15px; }
        .tier-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tier-icon { width: 24px; height: 24px; } /* Aquí irán tus imágenes png */
        .tier-tag { font-size: 0.75rem; font-weight: bold; color: #ffffff; background: #444; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="player-card">
    <div class="rank-number">#1</div>
    <div class="avatar"><img src="kronos.jpg" alt="Skin"></div>
    <div class="info">
        <div class="name">KRONOS OG</div>
        <div class="tiers-row">
            <div class="tier-item"><img src="sword.png" class="tier-icon"><span class="tier-tag">LT2</span></div>
            <div class="tier-item"><img src="uhc.png" class="tier-icon"><span class="tier-tag">LT3</span></div>
            <div class="tier-item"><img src="crystal.png" class="tier-icon"><span class="tier-tag">LT5</span></div>
            <div class="tier-item"><img src="axe.png" class="tier-icon"><span class="tier-tag">LT4</span></div>
        </div>
    </div>
</div>

</body>
</html>
