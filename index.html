<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MCB Tiers</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; padding: 20px; }
        h1 { text-align: center; color: #ffffff; margin-bottom: 20px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 25px; overflow-x: auto; justify-content: center; flex-wrap: wrap; max-width: 800px; margin-left: auto; margin-right: auto; }
        .tab-btn { background: #161b22; border: 1px solid #30363d; color: white; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #30363d; }
        .player-card { background: #161b22; border-radius: 12px; display: flex; align-items: center; padding: 15px; margin-bottom: 15px; border: 1px solid #30363d; width: 100%; max-width: 550px; margin: 10px auto; }
        .rank-number { font-size: 1.8rem; font-weight: bold; color: #f59e0b; margin-right: 15px; width: 40px; text-align: center; }
        
        /* ESTILO DE TU AVATAR CON ZOOM A LA CARA */
        .avatar-kronos { 
            width: 55px; height: 55px; border-radius: 8px; margin-right: 15px; flex-shrink: 0;
            background-image: url('https://i.postimg.cc/RF9Z9SXR/f877');
            background-size: 800% 400%; background-position: 12.5% 25%; background-repeat: no-repeat;
        }
        .avatar-steve { width: 55px; height: 55px; background: #21262d; border-radius: 8px; margin-right: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        .info { flex-grow: 1; }
        .name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .name { font-size: 1.2rem; font-weight: bold; }
        .points-badge { font-size: 0.75rem; background: #0284c7; padding: 4px 8px; border-radius: 12px; color: white; }
        .tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .tag { font-size: 0.75rem; padding: 5px 10px; border-radius: 8px; background: #21262d; border: 1px solid #30363d; }
    </style>
</head>
<body>

<h1>MCB TIERS</h1>

<div id="view-general">
    <!-- TU TARJETA CON TU SKIN -->
    <div class="player-card">
        <div class="rank-number">#1</div>
        <div class="avatar-kronos"></div>
        <div class="info">
            <div class="name-row">
                <div class="name">KRONOS OG1567</div>
                <div class="points-badge">106 Pts</div>
            </div>
            <div class="tags">
                <span class="tag">⚔️ LT1</span> <span class="tag">🍎 LT3</span> <span class="tag">🪓 LT5</span>
            </div>
        </div>
    </div>
    
    <!-- OTRAS TARJETAS (Mantiene el Steve por defecto) -->
    <div class="player-card">
        <div class="rank-number">#2</div>
        <div class="avatar-steve"><img src="https://mc-heads.net/avatar/Steve" width="55"></div>
        <div class="info">
            <div class="name-row"><div class="name">Asasin</div><div class="points-badge">34 Pts</div></div>
        </div>
    </div>
</div>

</body>
</html>
