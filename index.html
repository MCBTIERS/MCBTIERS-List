<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; padding: 10px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; overflow-x: auto; justify-content: center; }
        .tab-btn { background: #30363d; border: none; color: white; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .tab-btn.active { background: #f59e0b; color: black; }
        .player-card { background: #161b22; border-radius: 10px; display: flex; align-items: center; padding: 10px; margin-bottom: 10px; border: 1px solid #30363d; }
        .rank { font-size: 1.2rem; font-weight: bold; color: #f59e0b; margin-right: 15px; width: 30px; }
        .avatar { width: 50px; height: 50px; background: #000; border-radius: 5px; margin-right: 15px; }
        .info { flex-grow: 1; }
        .name { font-weight: bold; }
        .tags { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
        .tag { font-size: 0.6rem; padding: 2px 5px; border-radius: 10px; font-weight: bold; background: #30363d; }
    </style>
</head>
<body>

<div class="tabs">
    <button class="tab-btn active" onclick="filter('all', this)">General</button>
    <button class="tab-btn" onclick="filter('sword', this)">Sword</button>
    <button class="tab-btn" onclick="filter('uhc', this)">UHC</button>
    <button class="tab-btn" onclick="filter('axe', this)">Axe</button>
    <button class="tab-btn" onclick="filter('crystal', this)">Crystal</button>
</div>

<div id="list">
    <!-- Kronos -->
    <div class="player-card" data-modes="all sword uhc axe crystal mazo netherpot">
        <div class="rank">#1</div>
        <div class="avatar"><img src="https://mc-heads.net/avatar/Steve" width="50"></div>
        <div class="info">
            <div class="name">KRONOS OG</div>
            <div class="tags">
                <span class="tag">⚔️ LT1</span><span class="tag">🍎 LT3</span><span class="tag">🪓 LT5</span><span class="tag">🔮 LT4</span><span class="tag">🔨 LT4</span><span class="tag">🔥 Pot LT5</span>
            </div>
        </div>
    </div>
    <!-- Asasin -->
    <div class="player-card" data-modes="all sword uhc axe">
        <div class="rank">#2</div>
        <div class="avatar"><img src="https://mc-heads.net/avatar/Steve" width="50"></div>
        <div class="info">
            <div class="name">Asasin</div>
            <div class="tags">
                <span class="tag">⚔️ LT3</span><span class="tag">🍎 Sin rango</span><span class="tag">🪓 LT5</span>
            </div>
        </div>
    </div>
    <!-- Ryou -->
    <div class="player-card" data-modes="all sword">
        <div class="rank">#3</div>
        <div class="avatar"><img src="https://mc-heads.net/avatar/Steve" width="50"></div>
        <div class="info">
            <div class="name">Ryou</div>
            <div class="tags">
                <span class="tag">⚔️ LT5</span>
            </div>
        </div>
    </div>
    <!-- Conter -->
    <div class="player-card" data-modes="all sword uhc">
        <div class="rank">#4</div>
        <div class="avatar"><img src="https://mc-heads.net/avatar/Steve" width="50"></div>
        <div class="info">
            <div class="name">Conter</div>
            <div class="tags">
                <span class="tag">⚔️ LT4</span><span class="tag">🍎 LT4</span>
            </div>
        </div>
    </div>
    <!-- LastNight -->
    <div class="player-card" data-modes="all sword">
        <div class="rank">#5</div>
        <div class="avatar"><img src="https://mc-heads.net/avatar/Steve" width="50"></div>
        <div class="info">
            <div class="name">LastNight</div>
            <div class="tags">
                <span class="tag">⚔️ Sin rango</span>
            </div>
        </div>
    </div>
</div>

<script>
    function filter(mode, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.player-card').forEach(card => {
            card.style.display = (mode === 'all' || card.dataset.modes.includes(mode)) ? 'flex' : 'none';
        });
    }
</script>
</body>
</html>
