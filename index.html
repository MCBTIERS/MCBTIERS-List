<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCB Tiers</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; padding: 20px; }
        h1 { text-align: center; color: #ffffff; margin-bottom: 20px; }
        
        /* Pestañas (Modalidades) centradas y ordenadas */
        .tabs { display: flex; gap: 8px; margin-bottom: 25px; overflow-x: auto; justify-content: center; flex-wrap: wrap; max-width: 800px; margin-left: auto; margin-right: auto; }
        .tab-btn { background: #161b22; border: 1px solid #30363d; color: white; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem; white-space: nowrap; }
        .tab-btn.active, .tab-btn:hover { background: #30363d; border-color: #4a5568; }
        
        /* Tarjetas de Jugadores (más estrechas y estilizadas) */
        .player-card { background: #161b22; border-radius: 12px; display: flex; align-items: center; padding: 15px; margin-bottom: 15px; border: 1px solid #30363d; width: 100%; max-width: 550px; margin-left: auto; margin-right: auto; }
        .rank-number { font-size: 1.8rem; font-weight: bold; color: #f59e0b; margin-right: 15px; width: 40px; text-align: center; }
        .avatar { width: 60px; height: 60px; background: #21262d; border-radius: 6px; margin-right: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .avatar img { width: 100%; height: 100%; }
        .info { flex-grow: 1; }
        .name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .name { font-size: 1.2rem; font-weight: bold; }
        .points-badge { font-size: 0.75rem; background: #0284c7; padding: 4px 8px; border-radius: 12px; font-weight: bold; color: #ffffff; }
        
        /* Etiquetas de Tiers con iconos */
        .tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .tag { font-size: 0.75rem; font-weight: bold; padding: 4px 8px; border-radius: 6px; display: flex; align-items: center; gap: 4px; background: #21262d; border: 1px solid #30363d; }
    </style>
</head>
<body>

<h1>MCB TIERS</h1>

<div class="tabs">
    <button class="tab-btn active" onclick="filter('all')">🏆 General</button>
    <button class="tab-btn" onclick="filter('sword')">⚔️ Sword</button>
    <button class="tab-btn" onclick="filter('uhc')">🍎 UHC</button>
    <button class="tab-btn" onclick="filter('axe')">🪓 Axe</button>
    <button class="tab-btn" onclick="filter('crystal')">🔮 Crystal</button>
    <button class="tab-btn" onclick="filter('smp')">🌍 SMP</button>
    <button class="tab-btn" onclick="filter('mazo')">🔨 Mazo</button>
    <button class="tab-btn" onclick="filter('nether')">🔥 Nether Pot</button>
    <button class="tab-btn" onclick="filter('pot')">🧪 Pot</button>
</div>

<div id="players-list">
    <div class="player-card" data-modes="all sword uhc axe crystal smp mazo pot">
        <div class="rank-number">#1</div>
        <div class="avatar"><img src="https://mc-heads.net/avatar/Steve" alt="Skin"></div>
        <div class="info">
            <div class="name-row">
                <div class="name">KRONOS OG1567</div>
                <div class="points-badge">106 Pts</div>
            </div>
            <div class="tags">
                <span class="tag" style="color:#4ade80">⚔️ LT1</span>
                <span class="tag" style="color:#facc15">🍎 LT3</span>
                <span class="tag" style="color:#f87171">🪓 LT5</span>
                <span class="tag" style="color:#fb923c">🔮 LT4</span>
                <span class="tag" style="color:#fb923c">🌍 LT4</span>
                <span class="tag" style="color:#f87171">🔨 LT5</span>
                <span class="tag" style="color:#f87171">🧪 LT5</span>
            </div>
        </div>
    </div>

    <div class="player-card" data-modes="all sword axe crystal">
        <div class="rank-number">#2</div>
        <div class="avatar"><img src="https://mc-heads.net/avatar/Steve" alt="Skin"></div>
        <div class="info">
            <div class="name-row">
                <div class="name">Asasin</div>
                <div class="points-badge">34 Pts</div>
            </div>
            <div class="tags">
                <span class="tag" style="color:#facc15">⚔️ LT3</span>
                <span class="tag" style="color:#f87171">🪓 LT5</span>
                <span class="tag" style="color:#fb923c">🔮 LT4</span>
            </div>
        </div>
    </div>

    <div class="player-card" data-modes="all sword">
        <div class="rank-number">#3</div>
        <div class="avatar"><img src="https://mc-heads.net/avatar/Steve" alt="Skin"></div>
        <div class="info">
            <div class="name-row">
                <div class="name">Ryou</div>
                <div class="points-badge">14 Pts</div>
            </div>
            <div class="tags">
                <span class="tag" style="color:#f87171">⚔️ LT5</span>
            </div>
        </div>
    </div>

    <div class="player-card" data-modes="all sword uhc axe">
        <div class="rank-number">#4</div>
        <div class="avatar"><img src="https://mc-heads.net/avatar/Steve" alt="Skin"></div>
        <div class="info">
            <div class="name-row">
                <div class="name">Conter</div>
                <div class="points-badge">10 Pts</div>
            </div>
            <div class="tags">
                <span class="tag" style="color:#fb923c">⚔️ LT4</span>
                <span class="tag" style="color:#f87171">🍎 LT5</span>
                <span class="tag" style="color:#fb923c">🪓 LT4</span>
            </div>
        </div>
    </div>

    <div class="player-card" data-modes="all sword uhc">
        <div class="rank-number">#5</div>
        <div class="avatar"><img src="https://mc-heads.net/avatar/Steve" alt="Skin"></div>
        <div class="info">
            <div class="name-row">
                <div class="name">LastNight</div>
                <div class="points-badge">10 Pts</div>
            </div>
            <div class="tags">
                <span class="tag" style="color:#fb923c">⚔️ LT4</span>
                <span class="tag" style="color:#fb923c">🍎 LT4</span>
            </div>
        </div>
    </div>
</div>

<script>
    function filter(mode) {
        // Resalta el botón activo
        const buttons = document.querySelectorAll('.tab-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');

        // Filtra las tarjetas
        const cards = document.querySelectorAll('.player-card');
        cards.forEach(card => {
            const modes = card.getAttribute('data-modes');
            if (mode === 'all' || modes.includes(mode)) {
                card.style.display = 'flex';
            } else {
                card.style.display = 'none';
            }
        });
    }
</script>

</body>
    </html>
