<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCB Tiers</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; padding: 20px; }
        h1 { text-align: center; color: #ffffff; margin-bottom: 20px; }
        
        /* Pestañas */
        .tabs { display: flex; gap: 8px; margin-bottom: 25px; overflow-x: auto; justify-content: center; flex-wrap: wrap; max-width: 800px; margin-left: auto; margin-right: auto; }
        .tab-btn { background: #161b22; border: 1px solid #30363d; color: white; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem; white-space: nowrap; }
        .tab-btn.active, .tab-btn:hover { background: #30363d; border-color: #4a5568; }
        
        /* Tarjetas Generales */
        .player-card { background: #161b22; border-radius: 12px; display: flex; align-items: center; padding: 15px; margin-bottom: 15px; border: 1px solid #30363d; width: 100%; max-width: 550px; margin-left: auto; margin-right: auto; }
        .rank-number { font-size: 1.8rem; font-weight: bold; color: #f59e0b; margin-right: 15px; width: 40px; text-align: center; }
        .avatar { width: 55px; height: 55px; background: #21262d; border-radius: 8px; margin-right: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .avatar img { width: 100%; height: 100%; object-fit: contain; }
        .avatar-skin { width: 55px; height: 55px; background: #21262d; border-radius: 8px; margin-right: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .avatar-skin img { width: 100%; height: 100%; object-fit: cover; }
        
        .info { flex-grow: 1; }
        .name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .name { font-size: 1.2rem; font-weight: bold; }
        .points-badge { font-size: 0.75rem; background: #0284c7; padding: 4px 8px; border-radius: 12px; font-weight: bold; color: #ffffff; }
        .view-content { display: none; }
    </style>
</head>
<body>

<h1>MCB TIERS</h1>

<div class="tabs">
    <button class="tab-btn active" onclick="switchView('general', this)">🏆 General</button>
    <button class="tab-btn" onclick="switchView('sword', this)">⚔️ Sword</button>
    <button class="tab-btn" onclick="switchView('uhc', this)">🍎 UHC</button>
    <button class="tab-btn" onclick="switchView('axe', this)">🪓 Axe</button>
    <button class="tab-btn" onclick="switchView('crystal', this)">🔮 Crystal</button>
    <button class="tab-btn" onclick="switchView('smp', this)">🌍 SMP</button>
    <button class="tab-btn" onclick="switchView('mazo', this)">🔨 Mazo</button>
    <button class="tab-btn" onclick="switchView('nether', this)">🔥 Nether Pot</button>
    <button class="tab-btn" onclick="switchView('pot', this)">🧪 Pot</button>
</div>

<div id="view-general" class="view-content" style="display: block;">
    <div class="player-card"><div class="rank-number">#1</div><div class="avatar-skin"><img src="https://i.imgur.com/Q3rKrxl.jpeg"></div><div class="info"><div class="name-row"><div class="name">KRONOS OG1567</div><div class="points-badge">106 Pts</div></div></div></div>
    <div class="player-card"><div class="rank-number">#2</div><div class="avatar"><img src="https://mc-heads.net/avatar/Steve"></div><div class="info"><div class="name-row"><div class="name">Asasin</div><div class="points-badge">34 Pts</div></div></div></div>
    <div class="player-card"><div class="rank-number">#3</div><div class="avatar"><img src="https://mc-heads.net/avatar/Steve"></div><div class="info"><div class="name-row"><div class="name">Ryou</div><div class="points-badge">14 Pts</div></div></div></div>
    <div class="player-card"><div class="rank-number">#4</div><div class="avatar-skin"><img src="https://i.postimg.cc/DmJqcMP1/1000125178.jpg"></div><div class="info"><div class="name-row"><div class="name">Conter</div><div class="points-badge">10 Pts</div></div></div></div>
    <div class="player-card"><div class="rank-number">#5</div><div class="avatar-skin"><img src="https://i.postimg.cc/G9hFsp40/1000125162.jpg"></div><div class="info"><div class="name-row"><div class="name">LastNight</div><div class="points-badge">10 Pts</div></div></div></div>
    <div class="player-card"><div class="rank-number">#6</div><div class="avatar"><img src="https://mc-heads.net/avatar/Steve"></div><div class="info"><div class="name-row"><div class="name">Perritos Calientes</div><div class="points-badge">8 Pts</div></div></div></div>
</div>

<div id="view-sword" class="view-content"></div>
<div id="view-uhc" class="view-content"></div>
<div id="view-axe" class="view-content"></div>
<div id="view-crystal" class="view-content"></div>
<div id="view-smp" class="view-content"></div>
<div id="view-mazo" class="view-content"></div>
<div id="view-nether" class="view-content"></div>
<div id="view-pot" class="view-content"></div>

<script>
    function switchView(mode, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.view-content').forEach(v => v.style.display = 'none');
        document.getElementById('view-' + mode).style.display = 'block';
    }
</script>
</body>
</html>
