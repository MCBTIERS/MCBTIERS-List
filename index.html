<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCB Tiers</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; padding: 20px; }
        h1 { text-align: center; margin-bottom: 25px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 25px; overflow-x: auto; justify-content: center; padding-bottom: 10px; }
        .tab-btn { background: #161b22; border: 1px solid #30363d; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.85rem; white-space: nowrap; }
        .tab-btn.active { background: #30363d; border-color: #58a6ff; }
        
        /* Estilo de fila tipo lista (limpio, sin cuadros) */
        .player-row { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #21262d; width: 100%; max-width: 500px; margin: 0 auto; }
        .avatar-small { width: 35px; height: 35px; border-radius: 6px; margin-right: 15px; flex-shrink: 0; background: #21262d; object-fit: cover; }
        .name-container { flex-grow: 1; display: flex; align-items: center; justify-content: space-between; }
        .name { font-weight: bold; font-size: 1rem; }
        .lt-tag { font-size: 0.9rem; color: #f59e0b; font-weight: bold; }
        
        .view-content { display: none; }
    </style>
</head>
<body>

<h1>MCB TIERS</h1>

<div class="tabs">
    <button class="tab-btn active" onclick="switchView('general', this)">🏆 General</button>
    <button class="tab-btn" onclick="switchView('sword', this)">⚔️ Sword</button>
    <button class="tab-btn" onclick="switchView('uhc', this)">🍎 UHC</button>
    <button class="tab-btn" onclick="switchView('axe', this)">🪓 Axe</button>
    <button class="tab-btn" onclick="switchView('crystal', this)">🔮 Crystal</button>
    <button class="tab-btn" onclick="switchView('smp', this)">🌍 SMP</button>
    <button class="tab-btn" onclick="switchView('mazo', this)">🔨 Mazo</button>
    <button class="tab-btn" onclick="switchView('nether', this)">🔥 Nether</button>
    <button class="tab-btn" onclick="switchView('pot', this)">🧪 Pot</button>
</div>

<!-- Vista General (Mantiene tus tarjetas) -->
<div id="view-general" class="view-content" style="display: block;">
    <div class="player-row"><div style="color:#f59e0b; margin-right:15px; font-weight:bold;">#1</div><img src="https://i.imgur.com/Q3rKrxl.jpeg" class="avatar-small"><div class="name-container"><strong>KRONOS OG1567</strong></div></div>
    <div class="player-row"><div style="color:#f59e0b; margin-right:15px; font-weight:bold;">#2</div><img src="https://mc-heads.net/avatar/Steve" class="avatar-small"><div class="name-container"><strong>Asasin</strong></div></div>
</div>

<!-- Modalidades (Nuevo formato estilo lista) -->
<div id="view-sword" class="view-content">
    <div class="player-row"><img src="https://i.imgur.com/Q3rKrxl.jpeg" class="avatar-small"><div class="name-container"><span class="name">KRONOS OG1567</span><span class="lt-tag">LT1</span></div></div>
    <div class="player-row"><img src="https://mc-heads.net/avatar/Steve" class="avatar-small"><div class="name-container"><span class="name">Asasin</span><span class="lt-tag">LT3</span></div></div>
    <div class="player-row"><img src="https://i.postimg.cc/DmJqcMP1/1000125178.jpg" class="avatar-small"><div class="name-container"><span class="name">Conter</span><span class="lt-tag">LT4</span></div></div>
    <div class="player-row"><img src="https://mc-heads.net/avatar/Steve" class="avatar-small"><div class="name-container"><span class="name">Ryou</span><span class="lt-tag">LT5</span></div></div>
    <div class="player-row"><img src="https://mc-heads.net/avatar/Steve" class="avatar-small"><div class="name-container"><span class="name">Perritos Calientes</span><span class="lt-tag">LT5</span></div></div>
</div>

<div id="view-uhc" class="view-content">
    <div class="player-row"><img src="https://i.imgur.com/Q3rKrxl.jpeg" class="avatar-small"><div class="name-container"><span class="name">KRONOS OG1567</span><span class="lt-tag">LT3</span></div></div>
    <div class="player-row"><img src="https://i.postimg.cc/G9hFsp40/1000125162.jpg" class="avatar-small"><div class="name-container"><span class="name">LastNight</span><span class="lt-tag">LT4</span></div></div>
    <div class="player-row"><img src="https://mc-heads.net/avatar/Steve" class="avatar-small"><div class="name-container"><span class="name">Asasin</span><span class="lt-tag">LT5</span></div></div>
</div>

<div id="view-axe" class="view-content">
    <div class="player-row"><img src="https://mc-heads.net/avatar/Steve" class="avatar-small"><div class="name-container"><span class="name">Asasin</span><span class="lt-tag">LT4</span></div></div>
    <div class="player-row"><img src="https://i.imgur.com/Q3rKrxl.jpeg" class="avatar-small"><div class="name-container"><span class="name">KRONOS OG1567</span><span class="lt-tag">LT5</span></div></div>
</div>

<div id="view-crystal" class="view-content">
    <div class="player-row"><img src="https://i.imgur.com/Q3rKrxl.jpeg" class="avatar-small"><div class="name-container"><span class="name">KRONOS OG1567</span><span class="lt-tag">LT3</span></div></div>
    <div class="player-row"><img src="https://mc-heads.net/avatar/Steve" class="avatar-small"><div class="name-container"><span class="name">Asasin</span><span class="lt-tag">LT5</span></div></div>
</div>

<div id="view-smp" class="view-content"><div class="player-row"><span class="name">Sin registros</span></div></div>

<div id="view-mazo" class="view-content">
    <div class="player-row"><img src="https://i.imgur.com/Q3rKrxl.jpeg" class="avatar-small"><div class="name-container"><span class="name">KRONOS OG1567</span><span class="lt-tag">LT4</span></div></div>
    <div class="player-row"><img src="https://mc-heads.net/avatar/Steve" class="avatar-small"><div class="name-container"><span class="name">Perritos Calientes</span><span class="lt-tag">LT5</span></div></div>
</div>

<div id="view-nether" class="view-content"><div class="player-row"><span class="name">Sin registros</span></div></div>

<div id="view-pot" class="view-content">
    <div class="player-row"><img src="https://mc-heads.net/avatar/Steve" class="avatar-small"><div class="name-container"><span class="name">Ryou</span><span class="lt-tag">LT4</span></div></div>
    <div class="player-row"><img src="https://i.imgur.com/Q3rKrxl.jpeg" class="avatar-small"><div class="name-container"><span class="name">KRONOS OG1567</span><span class="lt-tag">LT5</span></div></div>
</div>

<script>
    function switchView(mode, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.view-content').forEach(v => v.style.display = 'none');
        document.getElementById('view-' + mode).style.display = 'block';
    }
</script>
</body>
</html>
