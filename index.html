<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCB Tiers</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; padding: 10px; }
        h1 { text-align: center; margin-bottom: 20px; font-size: 1.5rem; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; overflow-x: auto; justify-content: flex-start; padding: 5px; position: sticky; top: 0; background: #0d1117; z-index: 100; }
        .tab-btn { background: #161b22; border: 1px solid #30363d; color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8rem; white-space: nowrap; }
        .tab-btn.active { background: #30363d; border-color: #58a6ff; }
        .player-card { background: #161b22; border-radius: 10px; display: flex; align-items: center; padding: 12px; margin-bottom: 10px; border: 1px solid #30363d; width: 95%; max-width: 400px; margin-left: auto; margin-right: auto; }
        .avatar-skin { width: 45px; height: 45px; border-radius: 8px; margin-right: 12px; flex-shrink: 0; object-fit: cover; }
        .info { flex-grow: 1; display: flex; flex-direction: column; }
        .name { font-weight: bold; font-size: 1rem; }
        .points { font-size: 0.8rem; color: #0284c7; font-weight: bold; }
        .lt-tag { font-size: 0.8rem; color: #f59e0b; font-weight: bold; margin-top: 2px; }
        .view-content { display: none; }
    </style>
</head>
<body>

<h1>MCB TIERS</h1>

<div class="tabs">
    <button class="tab-btn active" onclick="switchView('general', this)">🏆 General</button>
    <button class="tab-btn" onclick="switchView('sword', this)">⚔️ Sword</button>
    <button class="tab-btn" onclick="switchView('uhc', this)">🍎 UHC</button>
    <button class="tab-btn" onclick="switchView('axe', this)">🪓 Axe</button>
    <button class="tab-btn" onclick="switchView('crystal', this)">🔮 Crystal</button>
    <button class="tab-btn" onclick="switchView('smp', this)">🌍 SMP</button>
    <button class="tab-btn" onclick="switchView('mazo', this)">🔨 Mazo</button>
    <button class="tab-btn" onclick="switchView('nether', this)">🔥 N. Pot</button>
    <button class="tab-btn" onclick="switchView('pot', this)">🧪 Pot</button>
</div>

<!-- Vista General -->
<div id="view-general" class="view-content" style="display: block;">
    <div class="player-card"><div style="margin-right:15px; font-weight:bold; color:#f59e0b;">#1</div><img src="https://i.imgur.com/Q3rKrxl.jpeg" class="avatar-skin"><div class="info"><span class="name">KRONOS OG1567</span><span class="points">106 Pts</span></div></div>
    <div class="player-card"><div style="margin-right:15px; font-weight:bold; color:#f59e0b;">#2</div><img src="https://mc-heads.net/avatar/Steve" class="avatar-skin"><div class="info"><span class="name">Asasin</span><span class="points">34 Pts</span></div></div>
    <div class="player-card"><div style="margin-right:15px; font-weight:bold; color:#f59e0b;">#3</div><img src="https://i.postimg.cc/DmJqcMP1/1000125178.jpg" class="avatar-skin"><div class="info"><span class="name">Conter</span><span class="points">20 Pts</span></div></div>
    <div class="player-card"><div style="margin-right:15px; font-weight:bold; color:#f59e0b;">#4</div><img src="https://mc-heads.net/avatar/Steve" class="avatar-skin"><div class="info"><span class="name">Ryou</span><span class="points">14 Pts</span></div></div>
    <div class="player-card"><div style="margin-right:15px; font-weight:bold; color:#f59e0b;">#5</div><img src="https://i.postimg.cc/G9hFsp40/1000125162.jpg" class="avatar-skin"><div class="info"><span class="name">LastNight</span><span class="points">10 Pts</span></div></div>
    <div class="player-card"><div style="margin-right:15px; font-weight:bold; color:#f59e0b;">#6</div><img src="https://mc-heads.net/avatar/Steve" class="avatar-skin"><div class="info"><span class="name">Perritos Calientes</span><span class="points">8 Pts</span></div></div>
</div>

<!-- Vista Sword -->
<div id="view-sword" class="view-content">
    <div class="player-card"><img src="https://i.imgur.com/Q3rKrxl.jpeg" class="avatar-skin"><div class="info"><span class="name">KRONOS OG1567</span><span class="lt-tag">LT1</span></div></div>
    <div class="player-card"><img src="https://mc-heads.net/avatar/Steve" class="avatar-skin"><div class="info"><span class="name">Asasin</span><span class="lt-tag">LT3</span></div></div>
    <div class="player-card"><img src="https://i.postimg.cc/DmJqcMP1/1000125178.jpg" class="avatar-skin"><div class="info"><span class="name">Conter</span><span class="lt-tag">LT3</span></div></div>
    <div class="player-card"><img src="https://mc-heads.net/avatar/Steve" class="avatar-skin"><div class="info"><span class="name">Ryou</span><span class="lt-tag">LT5</span></div></div>
    <div class="player-card"><img src="https://mc-heads.net/avatar/Steve" class="avatar-skin"><div class="info"><span class="name">Perritos Calientes</span><span class="lt-tag">LT5</span></div></div>
</div>

<!-- ... resto de las vistas se mantienen igual ... -->

<script>
    function switchView(mode, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.view-content').forEach(v => v.style.display = 'none');
        document.getElementById('view-' + mode).style.display = 'block';
    }
</script>
</body>
</html>
