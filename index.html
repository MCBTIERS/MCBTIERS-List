<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCB Tiers</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; padding: 10px; }
        .player-card { background: #161b22; border-radius: 10px; display: flex; align-items: center; padding: 12px; margin-bottom: 10px; border: 1px solid #30363d; }
        .rank-number { font-size: 1.5rem; font-weight: bold; color: #f59e0b; margin-right: 15px; width: 35px; }
        .avatar { width: 60px; height: 60px; background: #30363d; border-radius: 5px; margin-right: 15px; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; }
        .info { flex-grow: 1; }
        .name { font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; }
        .tiers-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .tag { font-size: 0.7rem; font-weight: bold; padding: 3px 7px; border-radius: 12px; }
    </style>
</head>
<body>

<!-- KRONOS OG -->
<div class="player-card">
    <div class="rank-number">#1</div>
    <div class="avatar"><img src="https://mc-heads.net/avatar/KRONOS_OG1567" alt="Avatar"></div>
    <div class="info">
        <div class="name">KRONOS OG1567</div>
        <div class="tiers-row">
            <span class="tag" style="background:#4ade80">LT1</span>
            <span class="tag" style="background:#facc15">LT3</span>
            <span class="tag" style="background:#ef4444">LT5</span>
        </div>
    </div>
</div>

<!-- Asasin -->
<div class="player-card">

    <div class="avatar"><img src="https://mc-heads.net/avatar/Steve" alt="Avatar"></div>
    <div class="info">
        <div class="name">Asasin</div>
        <div class="tiers-row">
            <span class="tag" style="background:#facc15">LT3</span>
        </div>
    </div>
</div>

<!-- Ryou -->
<div class="player-card">
    <div class="rank-number">#3</div>
    <div class="avatar"><img src="https://mc-heads.net/avatar/Steve" alt="Avatar"></div>
    <div class="info">
        <div class="name">Ryou</div>
        <div class="tiers-row">
            <span class="tag" style="background:#ef4444">LT5</span>
        </div>
    </div>
</div>

<!-- Conter -->

        <div class="name">Conter</div>
        <div class="tiers-row">

</body>
</html>
