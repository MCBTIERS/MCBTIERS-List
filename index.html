<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; padding: 10px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; }
        .tab-btn { background: #30363d; border: none; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .player-card { background: #161b22; border-radius: 10px; display: flex; align-items: center; padding: 12px; margin-bottom: 10px; border: 1px solid #30363d; }
        .rank-number { font-size: 1.5rem; font-weight: bold; color: #f59e0b; margin-right: 15px; width: 30px; }
        .avatar { width: 60px; height: 60px; background: #000; border-radius: 5px; margin-right: 15px; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
        .info { flex-grow: 1; }
        .name { font-weight: bold; margin-bottom: 5px; }
        .tiers-row { display: flex; gap: 10px; }
        .tier-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .icon { font-size: 1.2rem; }
        .tag { font-size: 0.65rem; font-weight: bold; background: #30363d; padding: 1px 4px; border-radius: 3px; }
    </style>
</head>
<body>

<!-- Botones de Modalidades -->
<div class="tabs">
    <button class="tab-btn">General</button>
    <button class="tab-btn">Sword</button>
    <button class="tab-btn">UHC</button>
    <button class="tab-btn">Crystal</button>
    <button class="tab-btn">Axe</button>
</div>

<!-- Tarjeta de KRONOS OG -->
<div class="player-card">
    <div class="rank-number">#1</div>
    <div class="avatar"><img src="kronos.jpg" alt="Skin"></div>
    <div class="info">
        <div class="name">KRONOS OG</div>
        <div class="tiers-row">
            <div class="tier-item"><span class="icon">⚔️</span><span class="tag">LT2</span></div>
            <div class="tier-item"><span class="icon">🍎</span><span class="tag">LT3</span></div>
            <div class="tier-item"><span class="icon">🔮</span><span class="tag">LT5</span></div>
            <div class="tier-item"><span class="icon">🔨</span><span class="tag">LT4</span></div>
        </div>
    </div>
</div>

<!-- Jugadores adicionales (Asasin, Ryou, etc.) -->
<div class="player-card">
    <div class="rank-number">#2</div>
    <div class="avatar">👤</div>
    <div class="name">Asasin</div>
</div>

</body>
</html>
